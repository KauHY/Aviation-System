<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 民航飞机检修记录系统</title>
    <link rel="stylesheet" href="/tcg/static/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="/tcg" class="logo">民航飞机检修记录系统</a>
                <ul class="nav-links">
                    <li><a href="/tcg">首页</a></li>
                        <li><a href="/tcg/search">查询记录</a></li>
                        <li><a href="/tcg/blockchain">区块链</a></li>
                        <li><a href="/tcg/login">登录</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="card" style="max-width: 450px; margin: 4rem auto; animation: fadeIn 0.8s ease-out;">
                <h2 style="text-align: center; color: var(--primary-color);">用户登录</h2>
                
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                
                <form action="/tcg/login" method="post">
                    <div class="form-group">
                        <label for="address" class="form-label">用户地址</label>
                        <input type="text" id="address" name="address" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
                </form>
                
                <div style="margin-top: 1.5rem; padding: 1.5rem; background-color: rgba(99, 179, 237, 0.1); border-radius: 6px; border-left: 4px solid var(--secondary-color);">
                    <h3 style="margin-bottom: 1rem; font-size: 1.1rem; color: var(--primary-color);">默认账号信息</h3>
                    <p><strong>管理员账号：</strong></p>
                    <p>地址：0x0000000000000000000000000000000000000001</p>
                    <p>密码：123456</p>
                    <p><strong>测试用户：</strong></p>
                    <p>地址：0x0000000000000000000000000000000000000002</p>
                    <p>密码：123456</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 民航飞机检修记录系统</p>
        </div>
    </footer>
</body>
</html>
