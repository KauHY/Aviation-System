<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 飞机检修远程操作系统</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* 背景动画效果 */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .plane {
            position: absolute;
            width: 100px;
            height: 100px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="rgba(255,255,255,0.1)" d="M90 50L10 30V70L90 50Z"/><path fill="rgba(255,255,255,0.2)" d="M90 50L50 40V60L90 50Z"/></svg>') no-repeat center;
            animation: fly 20s linear infinite;
        }
        
        .plane:nth-child(1) {
            top: 20%;
            animation-delay: 0s;
            animation-duration: 25s;
        }
        
        .plane:nth-child(2) {
            top: 40%;
            animation-delay: -5s;
            animation-duration: 30s;
        }
        
        .plane:nth-child(3) {
            top: 60%;
            animation-delay: -10s;
            animation-duration: 20s;
        }
        
        @keyframes fly {
            0% {
                transform: translateX(-100px) translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateX(calc(100vw + 100px)) translateY(-50px) rotate(10deg);
                opacity: 0;
            }
        }
        
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
            animation: slideIn 1s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .logo h1 {
            color: #2b6cb0;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #4a5568;
            font-size: 14px;
        }
        
        .form-container {
            animation: fadeIn 0.8s ease-out 0.2s both;
        }
        
        .form-header {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .form-header button {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #718096;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .form-header button.active {
            color: #2b6cb0;
        }
        
        .form-header button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #2b6cb0;
            animation: slideInUnderline 0.3s ease-out;
        }
        
        @keyframes slideInUnderline {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #2d3748;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }
        
        input:focus {
            outline: none;
            border-color: #2b6cb0;
            box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #2b6cb0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(43, 108, 176, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .form-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #718096;
        }
        
        .form-toggle a {
            color: #2b6cb0;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .form-toggle a:hover {
            color: #2563eb;
            text-decoration: underline;
        }
        
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            border-left: 4px solid #fc8181;
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            border-left: 4px solid #68d391;
        }
        
        .form-panel {
            display: none;
        }
        
        .form-panel.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }
        
        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                margin: 20px;
                padding: 30px;
            }
            
            .logo h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="plane"></div>
        <div class="plane"></div>
        <div class="plane"></div>
    </div>
    
    <div class="container">
        <div class="logo">
            <h1>飞机检修远程操作系统</h1>
            <p>Aviation Maintenance Remote System</p>
        </div>
        
        <div class="form-container">
            <div class="form-header">
                <button class="active" id="login-tab">登录</button>
                <button id="register-tab">注册</button>
            </div>
            
            <!-- 登录表单 -->
            <div class="form-panel active" id="login-form">
                <div id="login-error" class="error-message" style="display: none;"></div>
                
                <div class="form-group">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码">
                </div>
                
                <button class="btn" id="login-btn">登录系统</button>
                
                <div class="form-toggle">
                    还没有账号？ <a href="#" id="switch-to-register">立即注册</a>
                </div>
            </div>
            
            <!-- 注册表单 -->
            <div class="form-panel" id="register-form">
                <div id="register-error" class="error-message" style="display: none;"></div>
                <div id="register-success" class="success-message" style="display: none;"></div>
                
                <div class="form-group">
                    <label for="register-username">用户名</label>
                    <input type="text" id="register-username" placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="register-password">密码</label>
                    <input type="password" id="register-password" placeholder="请输入密码（至少6位）">
                </div>
                
                <div class="form-group">
                    <label for="register-confirm-password">确认密码</label>
                    <input type="password" id="register-confirm-password" placeholder="请再次输入密码">
                </div>
                
                <div class="form-group">
                    <label for="register-role">身份类型</label>
                    <select id="register-role" style="width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; background: white;">
                        <option value="technician">技术人员</option>
                        <option value="manager">管理人员</option>
                        <option value="admin">总负责人</option>
                    </select>
                </div>
                
                <div class="form-group" id="verification-code-group" style="display: none;">
                    <label for="register-verification">验证码</label>
                    <input type="text" id="register-verification" placeholder="请输入验证码">
                </div>
                
                <button class="btn" id="register-btn">注册账号</button>
                
                <div class="form-toggle">
                    已有账号？ <a href="#" id="switch-to-login">立即登录</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // DOM元素
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const switchToRegister = document.getElementById('switch-to-register');
        const switchToLogin = document.getElementById('switch-to-login');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const loginError = document.getElementById('login-error');
        const registerError = document.getElementById('register-error');
        const registerSuccess = document.getElementById('register-success');
        const registerRole = document.getElementById('register-role');
        const verificationCodeGroup = document.getElementById('verification-code-group');
        const registerVerification = document.getElementById('register-verification');
        
        // 切换表单
        function switchForm(formType) {
            if (formType === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
            }
            // 清除错误信息
            loginError.style.display = 'none';
            registerError.style.display = 'none';
            registerSuccess.style.display = 'none';
        }
        
        // 身份选择事件监听
        registerRole.addEventListener('change', function() {
            if (this.value === 'manager' || this.value === 'admin') {
                verificationCodeGroup.style.display = 'block';
            } else {
                verificationCodeGroup.style.display = 'none';
            }
        });
        
        // 事件监听
        loginTab.addEventListener('click', () => switchForm('login'));
        registerTab.addEventListener('click', () => switchForm('register'));
        switchToRegister.addEventListener('click', (e) => {
            e.preventDefault();
            switchForm('register');
        });
        switchToLogin.addEventListener('click', (e) => {
            e.preventDefault();
            switchForm('login');
        });
        
        // 登录功能
        loginBtn.addEventListener('click', async () => {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            if (!username || !password) {
                loginError.textContent = '请填写用户名和密码';
                loginError.style.display = 'block';
                return;
            }
            
            try {
                // 使用后端API进行登录
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 登录成功，保存用户信息
                    localStorage.setItem('currentUser', data.username);
                    localStorage.setItem('currentUserRole', data.role || 'user');
                    localStorage.setItem('currentUserAddress', data.address);
                    localStorage.setItem('currentUserPublicKey', data.public_key || '');
                    localStorage.setItem('currentUserEmployeeId', data.employee_id || '');
                    
                    // 保存access_token到localStorage和cookie
                    if (data.access_token) {
                        localStorage.setItem('access_token', data.access_token);
                        // 设置cookie，确保在所有路径下都可用
                        const expires = new Date();
                        expires.setDate(expires.getDate() + 7); // 7天后过期
                        document.cookie = `access_token=${data.access_token}; path=/; expires=${expires.toUTCString()}; SameSite=Lax`;
                    }
                    
                    // 保存私钥（优先使用服务器返回的私钥，如果没有则使用注册时保存的）
                    if (data.private_key) {
                        localStorage.setItem('private_key', data.private_key);
                        // 同时保存到用户名对应的key
                        localStorage.setItem(`private_key_${data.username}`, data.private_key);
                    } else {
                        const savedPrivateKey = localStorage.getItem(`private_key_${data.username}`);
                        if (savedPrivateKey) {
                            localStorage.setItem('private_key', savedPrivateKey);
                        }
                    }
                    
                    // 跳转到主页面
                    window.location.href = '/';
                } else {
                    loginError.textContent = data.error || '登录失败';
                    loginError.style.display = 'block';
                }
            } catch (error) {
                console.error('登录失败:', error);
                loginError.textContent = '网络错误，请稍后重试';
                loginError.style.display = 'block';
            }
        });
        
        // 注册功能
        registerBtn.addEventListener('click', async () => {
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            const role = registerRole.value;
            const verificationCode = registerVerification.value;
            
            // 验证输入
            if (!username || !password || !confirmPassword) {
                registerError.textContent = '请填写所有字段';
                registerError.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                registerError.textContent = '密码长度至少6位';
                registerError.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                registerError.textContent = '两次输入的密码不一致';
                registerError.style.display = 'block';
                return;
            }
            
            // 验证码验证
            if (role === 'manager' && verificationCode !== '111') {
                registerError.textContent = '管理人员验证码错误';
                registerError.style.display = 'block';
                return;
            }
            
            if (role === 'admin' && verificationCode !== '123456') {
                registerError.textContent = '总负责人验证码错误';
                registerError.style.display = 'block';
                return;
            }
            
            try {
                // 使用后端API进行注册
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, role })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 保存私钥到localStorage（使用用户名作为key，避免覆盖）
                    if (data.private_key) {
                        localStorage.setItem(`private_key_${username}`, data.private_key);
                        // 同时保存到通用的private_key，方便使用
                        localStorage.setItem('private_key', data.private_key);
                    }
                    
                    // 显示成功信息，包括私钥
                    registerSuccess.innerHTML = `
                        <strong>注册成功！</strong><br>
                        <p style="margin: 10px 0;">您的私钥（请妥善保管，系统不会存储）：</p>
                        <div style="background: #f8fafc; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; margin: 10px 0;">
                            ${data.private_key || ''}
                        </div>
                        <p style="color: #e53e3e; font-weight: 500;">${data.warning || '请妥善保管您的私钥，丢失后无法找回！'}</p>
                        <p>私钥已保存到浏览器本地存储，3秒后跳转到登录页面...</p>
                    `;
                    registerSuccess.style.display = 'block';
                    registerError.style.display = 'none';
                    
                    // 3秒后切换到登录表单
                    setTimeout(() => {
                        switchForm('login');
                        // 填充用户名
                        document.getElementById('login-username').value = username;
                    }, 3000);
                } else {
                    registerError.textContent = data.error || '注册失败';
                    registerError.style.display = 'block';
                    registerSuccess.style.display = 'none';
                }
            } catch (error) {
                console.error('注册失败:', error);
                registerError.textContent = '网络错误，请稍后重试';
                registerError.style.display = 'block';
                registerSuccess.style.display = 'none';
            }
        });
        
        // 检查是否已登录
        if (localStorage.getItem('currentUser')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
