    <script>
        window.echartsLoadError = '';
        window.echartsReady = new Promise((resolve) => {
            const localSrc = '/static/js/echarts.min.js';
            const cdnSrc = 'https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js';

            const loadScript = (src, onSuccess, onFailure) => {
                const script = document.createElement('script');
                script.src = src;
                script.async = true;
                script.onload = () => onSuccess();
                script.onerror = () => onFailure();
                document.head.appendChild(script);
            };

            loadScript(
                localSrc,
                () => resolve(true),
                () => {
                    loadScript(
                        cdnSrc,
                        () => resolve(true),
                        () => {
                            window.echartsLoadError = 'Failed to load ECharts from local and CDN.';
                            resolve(false);
                        }
                    );
                }
            );
        });
    </script>

    <script>
        // 加载中国地图数据（仅使用本地静态文件，避免云端外链不稳定）
        window.chinaMapLoaded = false;
        window.chinaMapLoadError = '';
        window.chinaMapLoadingPromise = null;

        async function loadChinaMapOnce() {
            const echartsLoaded = await (window.echartsReady || Promise.resolve(false));
            if (!echartsLoaded || typeof echarts === 'undefined') {
                window.chinaMapLoadError = window.echartsLoadError || 'ECharts not available.';
                window.chinaMapLoaded = false;
                console.warn('ECharts not available for map rendering:', window.chinaMapLoadError);
                return false;
            }

            const url = '/static/china-map.json';

            try {
                const response = await fetch(url, { cache: 'no-cache' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const chinaJson = await response.json();
                echarts.registerMap('china', chinaJson);
                window.chinaMapLoaded = true;
                window.chinaMapLoadError = '';
                console.log('中国地图数据加载成功，来源:', url);
                return true;
            } catch (error) {
                console.warn('本地地图加载失败:', url, error);
                window.chinaMapLoadError = `${url} -> ${error.message || error}`;
            }

            window.chinaMapLoaded = false;
            return false;
        }

        window.chinaMapLoadingPromise = loadChinaMapOnce();
    </script>

    <script>
        // 登录检查
        function checkLogin() {
            const currentUser = localStorage.getItem('currentUser');
            const currentUserRole = localStorage.getItem('currentUserRole');
            
            if (!currentUser) {
                // 未登录，重定向到登录页面
                window.location.href = '/login';
            } else {
                // 更新用户信息
                document.getElementById('user-name').textContent = currentUser;
                document.getElementById('user-avatar').textContent = currentUser.charAt(0).toUpperCase();
                
                // 更新用户角色显示
                const userRoleElement = document.querySelector('.user-role');
                if (userRoleElement) {
                    let roleText = '技术人员';
                    if (currentUserRole === 'manager') {
                        roleText = '管理人员';
                    } else if (currentUserRole === 'admin') {
                        roleText = '总负责人';
                    }
                    userRoleElement.textContent = roleText;
                }
            }
        }
        
        // 页面加载时检查登录状态
        window.addEventListener('load', checkLogin);
        
        // 航班查询功能
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded事件触发');
            
            const searchBtn = document.getElementById('search-flight-btn');
            if (searchBtn) {
                searchBtn.addEventListener('click', async function() {
                    const flightNumber = document.getElementById('flight-number').value;
                    const departureAirport = document.getElementById('departure-airport').value;
                    const arrivalAirport = document.getElementById('arrival-airport').value;
                    const flightDate = document.getElementById('flight-date').value;
                    
                    // 验证表单
                    if (!flightNumber && !departureAirport && !arrivalAirport) {
                        alert('请至少输入一个查询条件');
                        return;
                    }
                    
                    // 显示加载状态
                    const resultsContainer = document.getElementById('results-container');
                    resultsContainer.innerHTML = '<div style="text-align: center; padding: 40px 0;"><div class="loading"></div><p style="margin-top: 15px;">查询中...</p></div>';
                    
                    // 禁用查询按钮
                    searchBtn.disabled = true;
                    searchBtn.style.opacity = '0.7';
                    searchBtn.textContent = '查询中...';
                    
                    try {
                        // 发送请求到后端API
                        const response = await fetch('/api/flight/search', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                flight_number: flightNumber,
                                departure_airport: departureAirport,
                                arrival_airport: arrivalAirport,
                                flight_date: flightDate
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            displayFlightResults(data.flights);
                        } else {
                            resultsContainer.innerHTML = `<p class="no-results">${data.message || '未找到航班信息'}</p>`;
                        }
                    } catch (error) {
                        console.error('查询航班失败:', error);
                        resultsContainer.innerHTML = '<p class="no-results">查询失败，请稍后重试</p>';
                    } finally {
                        // 恢复查询按钮状态
                        searchBtn.disabled = false;
                        searchBtn.style.opacity = '1';
                        searchBtn.textContent = '查询航班';
                    }
                });
            }
            
            // 加载所有航班
            console.log('调用loadAllFlights()');
            loadAllFlights();

            // 为航班号输入框添加预览逻辑
            const airlineInput = document.getElementById('modal-airline');
            const flightNumInput = document.getElementById('modal-flight-number');
            const previewSpan = document.getElementById('full-flight-number-preview');
            const flightNumList = document.getElementById('modal-flight-number-list');

            if (airlineInput && flightNumInput && previewSpan) {
                // 当航班号输入变化时更新预览
                flightNumInput.addEventListener('input', updateFullFlightNumberPreview);
                
                // 当航司输入变化（可能包含了IATA代码）也更新预览
                airlineInput.addEventListener('input', function() {
                    updateFullFlightNumberPreview();
                });
            }

            function updateFullFlightNumberPreview() {
                const iata = airlineInput.dataset.iata || '';
                const num = flightNumInput.value.trim();
                if (iata && num) {
                    previewSpan.textContent = iata + num;
                } else if (num) {
                    previewSpan.textContent = (iata || '??') + num;
                } else {
                    previewSpan.textContent = '--';
                }
            }

            // 查看航班地图按钮点击事件
            const viewMapBtn = document.getElementById('view-map-btn');
            if (viewMapBtn) {
                viewMapBtn.addEventListener('click', function() {
                    showFlightMap();
                });
            }
            
            // 创建航班按钮点击事件
            const createFlightBtn = document.getElementById('create-flight-btn');
            console.log('创建航班按钮:', createFlightBtn);
            if (createFlightBtn) {
                createFlightBtn.addEventListener('click', function() {
                    console.log('点击创建航班按钮');
                    openFlightModal();
                });
            }
            
            // 关闭模态框
            const closeBtn = document.querySelector('.close');
            if (closeBtn) {
                closeBtn.addEventListener('click', function() {
                    closeFlightModal();
                });
            }
            
            // 关闭航班地图模态框
            const mapCloseBtn = document.querySelector('#flight-map-modal .close');
            if (mapCloseBtn) {
                mapCloseBtn.addEventListener('click', function() {
                    closeFlightMapModal();
                });
            }
            
            // 取消按钮点击事件
            const cancelBtn = document.getElementById('cancel-flight-btn');
            if (cancelBtn) {
                cancelBtn.addEventListener('click', function() {
                    closeFlightModal();
                });
            }
            
            // 航班表单提交事件
            const flightForm = document.getElementById('flight-form');
            if (flightForm) {
                flightForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    saveFlight();
                });
            }
            
            // 关闭航班详情模态框
            const detailsCloseBtn = document.querySelector('#flight-details-modal .close');
            if (detailsCloseBtn) {
                detailsCloseBtn.addEventListener('click', function() {
                    closeFlightDetailsModal();
                });
            }
            
            // 关闭检修记录模态框
            const inspectionCloseBtn = document.querySelector('#inspection-modal .close');
            if (inspectionCloseBtn) {
                inspectionCloseBtn.addEventListener('click', function() {
                    closeInspectionModal();
                });
            }
            
            // 关闭维修记录详情模态框
            const recordDetailCloseBtn = document.querySelector('#record-detail-modal .close');
            if (recordDetailCloseBtn) {
                recordDetailCloseBtn.addEventListener('click', function() {
                    closeRecordDetailModal();
                });
            }
        });
        
        // 加载所有航班
        async function loadAllFlights() {
            console.log('开始加载所有航班');
            try {
                const response = await fetch('/api/flights');
                console.log('获取航班响应:', response);
                if (response.ok) {
                    const data = await response.json();
                    console.log('获取航班数据:', data);
                    if (data && data.success) {
                        displayFlightResults(data.flights);
                        return;
                    }
                }
                // 如果服务器返回非200或格式不对，回退到本地存储的数据
                console.warn('服务器航班数据不可用，回退到本地存储');
            } catch (error) {
                console.warn('加载航班失败，回退到本地存储:', error);
            }

            // 回退：从 localStorage 读取已保存的航班
            try {
                const stored = JSON.parse(localStorage.getItem('storedFlights') || '{}');
                const flights = Object.keys(stored).map(id => {
                    return Object.assign({ id: id }, stored[id]);
                });
                displayFlightResults(flights);
            } catch (e) {
                console.error('从本地读取航班失败:', e);
                const resultsContainer = document.getElementById('results-container');
                resultsContainer.innerHTML = '<p class="no-results">无法加载航班信息</p>';
            }
        }
        
        // 显示航班查询结果
        function displayFlightResults(flights) {
            const resultsContainer = document.getElementById('results-container');
            
            if (!flights || flights.length === 0) {
                resultsContainer.innerHTML = '<p class="no-results">未找到匹配的航班信息</p>';
                return;
            }
            
            let html = `
                <table class="flight-list">
                    <thead>
                        <tr>
                            <th>航班信息</th>
                            <th>出发机场</th>
                            <th>到达机场</th>
                            <th>出发时间</th>
                            <th>到达时间</th>
                            <th>日期</th>
                            <th>飞机型号</th>
                            <th>飞机注册号</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            flights.forEach(flight => {
                html += `
                    <tr>
                        <td>
                            <div class="flight-number">${flight.flight_number}</div>
                            <div class="airline">${formatAirlineName(flight.airline) || '未知航空公司'}</div>
                        </td>
                        <td>${formatAirportDisplay(flight.departure_airport)}</td>
                        <td>${formatAirportDisplay(flight.arrival_airport)}</td>
                        <td>${flight.departure_time || '未知'}</td>
                        <td>${flight.arrival_time || '未知'}</td>
                        <td>${flight.flight_date || '未知'}</td>
                        <td>${flight.aircraft_type || '未知'}</td>
                        <td>${flight.aircraft_registration || '未知'}</td>
                        <td>
                            <span class="flight-status ${getStatusClass(flight.status)}">
                                ${getStatusText(flight.status)}
                            </span>
                        </td>
                        <td>
                            <div class="flight-actions">
                                <button class="btn primary small" onclick="viewFlightDetails('${flight.id}')">查看详情</button>
                                <button class="btn secondary small" onclick="editFlight('${flight.id}')">编辑</button>
                                <button class="btn danger small" onclick="deleteFlight('${flight.id}')">删除</button>
                                ${flight.aircraft_registration ? `<button class="btn secondary small" onclick="viewAircraftInspectionRecords('${flight.aircraft_registration}')">查看检修记录</button>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            resultsContainer.innerHTML = html;
        }
        
        // 获取状态样式类
        function getStatusClass(status) {
            switch (status) {
                case 'on-time':
                case '正常':
                    return 'on-time';
                case 'delayed':
                case '延误':
                    return 'delayed';
                case 'cancelled':
                case '取消':
                    return 'cancelled';
                default:
                    return 'on-time';
            }
        }
        
        // 获取状态文本
        function getStatusText(status) {
            switch (status) {
                case 'on-time':
                    return '准点';
                case 'delayed':
                    return '延误';
                case 'cancelled':
                    return '取消';
                default:
                    return status || '未知';
            }
        }
        
        // 打开航班模态框
        function openFlightModal() {
            console.log('开始打开航班模态框');
            try {
                const modalTitle = document.getElementById('modal-title');
                const flightId = document.getElementById('flight-id');
                const modalFlightNumber = document.getElementById('modal-flight-number');
                const modalAirline = document.getElementById('modal-airline');
                const modalDepartureAirport = document.getElementById('modal-departure-airport');
                const modalDepartureCity = document.getElementById('modal-departure-city');
                const modalArrivalAirport = document.getElementById('modal-arrival-airport');
                const modalArrivalCity = document.getElementById('modal-arrival-city');
                const modalDepartureTime = document.getElementById('modal-departure-time');
                const modalArrivalTime = document.getElementById('modal-arrival-time');
                const modalFlightDate = document.getElementById('modal-flight-date');
                const modalAircraftType = document.getElementById('modal-aircraft-type');
                const modalStatus = document.getElementById('modal-status');
                const flightModal = document.getElementById('flight-modal');
                
                console.log('模态框元素:', {
                    modalTitle: !!modalTitle,
                    flightId: !!flightId,
                    modalFlightNumber: !!modalFlightNumber,
                    modalAirline: !!modalAirline,
                    modalDepartureAirport: !!modalDepartureAirport,
                    modalDepartureCity: !!modalDepartureCity,
                    modalArrivalAirport: !!modalArrivalAirport,
                    modalArrivalCity: !!modalArrivalCity,
                    modalDepartureTime: !!modalDepartureTime,
                    modalArrivalTime: !!modalArrivalTime,
                    modalFlightDate: !!modalFlightDate,
                    modalAircraftType: !!modalAircraftType,
                    modalStatus: !!modalStatus,
                    flightModal: !!flightModal
                });
                
                if (modalTitle) modalTitle.textContent = '创建航班';
                if (flightId) flightId.value = '';
                if (modalFlightNumber) modalFlightNumber.value = '';
                if (modalAirline) modalAirline.value = '';
                if (modalDepartureAirport) modalDepartureAirport.value = '';
                if (modalDepartureCity) modalDepartureCity.value = '';
                if (modalArrivalAirport) modalArrivalAirport.value = '';
                if (modalArrivalCity) modalArrivalCity.value = '';
                if (modalDepartureTime) modalDepartureTime.value = '';
                if (modalArrivalTime) modalArrivalTime.value = '';
                if (modalFlightDate) modalFlightDate.value = '';
                if (modalAircraftType) modalAircraftType.value = '';
                if (modalStatus) modalStatus.value = '正常';
                if (flightModal) {
                    console.log('显示模态框');
                    flightModal.classList.add('active');
                } else {
                    console.error('模态框元素不存在');
                    alert('模态框元素不存在，请检查页面结构');
                }
            } catch (error) {
                console.error('打开模态框失败:', error);
                alert('打开模态框失败: ' + error.message);
            }
        }
        
        // 关闭航班模态框
        function closeFlightModal() {
            console.log('开始关闭航班模态框');
            try {
                const flightModal = document.getElementById('flight-modal');
                if (flightModal) {
                    flightModal.classList.remove('active');
                    console.log('模态框已关闭');
                } else {
                    console.error('模态框元素不存在');
                }
            } catch (error) {
                console.error('关闭模态框失败:', error);
            }
        }
        
        // 编辑航班

        // 保存航班（带后端失败回退到本地的保护）
        async function saveFlight() {
            const id = document.getElementById('flight-id').value;

            // 使用本地 AIRPORT_DATA 做校验（如果存在）
            const depInput = document.getElementById('modal-departure-airport');
            const arrInput = document.getElementById('modal-arrival-airport');
            const airportData = window.AIRPORT_DATA || [];

            if (airportData && airportData.length > 0) {
                const depVal = depInput.value.trim();
                const arrVal = arrInput.value.trim();
                const isDepValid = airportData.some(a => a.name === depVal || a.code === depVal || a.city === depVal);
                const isArrValid = airportData.some(a => a.name === arrVal || a.code === arrVal || a.city === arrVal);
                if (!isDepValid) {
                    alert('出发机场输入无效，请从列表中选择或输入正确的机场名称/代码');
                    depInput.focus();
                    return;
                }
                if (!isArrValid) {
                    alert('到达机场输入无效，请从列表中选择或输入正确的机场名称/代码');
                    arrInput.focus();
                    return;
                }
            }

            const airlineInput = document.getElementById('modal-airline');
            const flightNumInput = document.getElementById('modal-flight-number');
            let fullFlightNumber = flightNumInput.value.trim();
            const iata = (airlineInput && airlineInput.dataset && airlineInput.dataset.iata) ? airlineInput.dataset.iata : '';
            if (iata && !fullFlightNumber.toUpperCase().startsWith(iata.toUpperCase())) {
                fullFlightNumber = iata + fullFlightNumber;
            }

            const flightData = {
                flight_number: fullFlightNumber,
                airline: airlineInput ? airlineInput.value : '',
                departure_airport: depInput.value,
                departure_city: document.getElementById('modal-departure-city').value,
                arrival_airport: arrInput.value,
                arrival_city: document.getElementById('modal-arrival-city').value,
                departure_time: document.getElementById('modal-departure-time').value,
                arrival_time: document.getElementById('modal-arrival-time').value,
                flight_date: document.getElementById('modal-flight-date').value,
                aircraft_type: document.getElementById('modal-aircraft-type').value,
                aircraft_registration: document.getElementById('modal-aircraft-registration').value,
                status: document.getElementById('modal-status').value
            };

            // 首先尝试向后端提交
            try {
                let res;
                if (id) {
                    res = await fetch(`/api/flights/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(flightData)
                    });
                } else {
                    res = await fetch('/api/flights', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(flightData)
                    });
                }

                // 若后端正常响应且返回success，则认为保存成功
                if (res && res.ok) {
                    const data = await res.json();
                    console.log('保存航班响应:', data);
                    if (data && data.success) {
                        const storedFlights = JSON.parse(localStorage.getItem('storedFlights') || '{}');
                        const flightId = id || data.flight && data.flight.id ? data.flight.id : (Date.now().toString());
                        storedFlights[flightId] = flightData;
                        localStorage.setItem('storedFlights', JSON.stringify(storedFlights));
                        alert(id ? '航班更新成功' : '航班创建成功');
                        closeFlightModal();
                        loadAllFlights();
                        return;
                    }
                    // 如果后端返回失败，抛出以走回退逻辑
                    throw new Error((data && data.message) ? data.message : '后端保存失败');
                } else {
                    throw new Error('后端未响应或返回错误状态');
                }
            } catch (err) {
                console.warn('后端保存失败，使用本地保存作为回退：', err);
                // 回退：保存在 localStorage 中
                try {
                    const storedFlights = JSON.parse(localStorage.getItem('storedFlights') || '{}');
                    const generatedId = id || ('local-' + Date.now());
                    storedFlights[generatedId] = flightData;
                    localStorage.setItem('storedFlights', JSON.stringify(storedFlights));
                    alert('当前无法连接后端，航班已保存到本地（离线）。');
                    closeFlightModal();
                    loadAllFlights();
                    return;
                } catch (e) {
                    console.error('本地保存也失败:', e);
                    alert('保存失败，请稍后重试');
                }
            }
        }

            '银川': [106.2309, 38.4872],
            '西宁': [101.7782, 36.6171],
            '乌鲁木齐': [87.6168, 43.8256],
            '喀什': [75.9883, 39.4707],
            '拉萨': [91.1174, 29.6469],
            '呼和浩特': [111.7492, 40.8426],
            '太原': [112.5489, 37.8706],
            '石家庄': [114.5149, 38.0423],
            '长春': [125.3235, 43.8171],
            '包头': [109.8298, 40.6626],
            '南阳': [112.5326, 33.0080],
            '遵义': [106.9339, 27.7183],
            '金昌': [102.1883, 38.6070],
            '张家口': [114.8736, 40.8065],
            '吐鲁番': [89.1787, 42.9249],
            '克州': [79.9269, 39.7151],
            '和田': [79.9265, 37.1733]
        };
        
        // Helper to construct display text for airport label including code
        function formatAirportDisplay(label) {
            if (!label) return '';
            let code = null;
            if (window.AIRPORT_DATA && Array.isArray(window.AIRPORT_DATA)) {
                const found = window.AIRPORT_DATA.find(a => {
                    return a.name === label || a.code === label
                        || (label.includes(a.name) || label.includes(a.code));
                });
                if (found) code = found.code;
            }
            if (code && !label.includes(code)) {
                return `${label} (${code})`;
            }
            return label;
        }
        
        // 简化航空公司名称，例如去掉“股份有限公司”等后缀
        function formatAirlineName(name) {
            if (!name) return '';
            // remove common corporate suffixes
            return name.replace(/股份有限公司|有限公司|公司|集团公司/, function(match) {
                // keep 最小部分 if only one word remains
                return match === '公司' ? '公司' : '公司';
            });
        }
        
        // 从 AIRPORT_DATA 构建机场坐标映射，优先使用机场经纬度
        const airportCoordinates = {};
        if (window.AIRPORT_DATA && Array.isArray(window.AIRPORT_DATA)) {
            window.AIRPORT_DATA.forEach(a => {
                if (a.lat != null && a.lon != null) {
                    const coords = [a.lon, a.lat];
                    if (a.name) airportCoordinates[a.name] = coords;
                    if (a.code) airportCoordinates[a.code] = coords;
                    // 也将去掉"国际机场"后缀的简化名称作为键
                    if (a.name) {
                        const short = a.name.replace(/国际机场$/,'');
                        if (short !== a.name) airportCoordinates[short] = coords;
                    }
                }
            });
        }

        // 查找给定机场标识的坐标（名称或代码），路径中包含则也能匹配
        function getCoordsForAirport(label) {
            if (!label) return null;
            if (airportCoordinates[label]) return airportCoordinates[label];
            // try exact match ignoring case
            const lc = label.toLowerCase();
            for (const key of Object.keys(airportCoordinates)) {
                if (key.toLowerCase() === lc) return airportCoordinates[key];
            }
            // partial contains
            for (const key of Object.keys(airportCoordinates)) {
                if (label.includes(key) || key.includes(label)) {
                    return airportCoordinates[key];
                }
            }
            // fallback to city coordinate
            if (cityCoordinates[label]) return cityCoordinates[label];
            return null;
        }
        
        // 全局变量存储航班数据
        let allFlightData = [];
        let allCityData = [];
        let allCitySet = new Set();
        let mapChartInstance = null;

        async function ensureChinaMapReady() {
            if (window.chinaMapLoaded) return true;
            if (!window.chinaMapLoadingPromise) {
                window.chinaMapLoadingPromise = loadChinaMapOnce();
            }

            try {
                return await window.chinaMapLoadingPromise;
            } catch (_) {
                return false;
            }
        }
        
        // 显示航班地图
        async function showFlightMap() {
            try {
                const mapReady = await ensureChinaMapReady();
                if (!mapReady) {
                    throw new Error(`中国地图数据加载失败（可能被外网策略拦截）。最后错误：${window.chinaMapLoadError || '未知错误'}`);
                }

                const response = await fetch('/api/flights');
                if (!response.ok) {
                    throw new Error(`/api/flights 请求失败: HTTP ${response.status}`);
                }
                const result = await response.json();
                const flights = result.flights || [];
                
                allFlightData = [];
                allCityData = [];
                allCitySet = new Set();
                
                const mapModal = document.getElementById('flight-map-modal');
                mapModal.classList.add('active');
                
                const chartDom = document.getElementById('flight-map');
                mapChartInstance = echarts.init(chartDom);
                
                flights.forEach(flight => {
                    // try to resolve airport coordinates first
                    const depLabel = flight.departure_airport || '';
                    const arrLabel = flight.arrival_airport || '';
                    const depCoords = getCoordsForAirport(depLabel);
                    const arrCoords = getCoordsForAirport(arrLabel);

                    if (depCoords && arrCoords) {
                        // record names for legend (use labels)
                        allCitySet.add(depLabel);
                        allCitySet.add(arrLabel);

                        let color = '#38a169';
                        if (flight.status === '延误') {
                            color = '#dd6b20';
                        } else if (flight.status === '取消') {
                            color = '#e53e3e';
                        }

                        allFlightData.push({
                            fromName: depLabel,
                            toName: arrLabel,
                            coords: [depCoords, arrCoords],
                            lineStyle: {
                                color: color,
                                width: 2,
                                curveness: 0.2
                            },
                            flightNumber: flight.flight_number,
                            airline: flight.airline,
                            status: flight.status,
                            flightDate: flight.flight_date
                        });
                    }
                });
                
                allCitySet.forEach(name => {
                    const coords = getCoordsForAirport(name);
                    if (coords) {
                        allCityData.push({
                            name: name,
                            value: coords
                        });
                    }
                });
                
                updateMapChart(allFlightData, allCityData);
                
                window.addEventListener('resize', function() {
                    if (mapChartInstance) {
                        mapChartInstance.resize();
                    }
                });
                
                mapModal.chartInstance = mapChartInstance;
                
                // 添加日期筛选事件监听器
                const applyDateFilterBtn = document.getElementById('apply-date-filter');
                const clearDateFilterBtn = document.getElementById('clear-date-filter');
                
                if (applyDateFilterBtn) {
                    applyDateFilterBtn.onclick = function() {
                        const dateFilter = document.getElementById('map-date-filter').value;
                        filterFlightsByDate(dateFilter);
                    };
                }
                
                if (clearDateFilterBtn) {
                    clearDateFilterBtn.onclick = function() {
                        document.getElementById('map-date-filter').value = '';
                        updateMapChart(allFlightData, allCityData);
                    };
                }
                
            } catch ( error) {
                console.error('加载航班地图失败:', error);
                alert(`加载航班地图失败：${error.message || '请稍后重试'}`);
            }
        }
        
        // 根据日期筛选航班
        function filterFlightsByDate(dateFilter) {
            const filteredFlightData = [];
            const filteredCitySet = new Set();
            
            if (!dateFilter) {
                filteredFlightData.push(...allFlightData);
                allCitySet.forEach(city => filteredCitySet.add(city));
            } else {
                allFlightData.forEach(flight => {
                    if (flight.flightDate === dateFilter) {
                        filteredFlightData.push(flight);
                        filteredCitySet.add(flight.fromName);
                        filteredCitySet.add(flight.toName);
                    }
                });
            }
            
            const filteredCityData = [];
            filteredCitySet.forEach(name => {
                const coords = getCoordsForAirport(name);
                if (coords) {
                    filteredCityData.push({
                        name: name,
                        value: coords
                    });
                }
            });
            
            updateMapChart(filteredFlightData, filteredCityData);
        }
        
        // 更新地图图表
        function updateMapChart(flightData, cityData) {
            if (!mapChartInstance) return;
            
            const option = {
                title: {
                    text: '中国航班航线图',
                    left: 'center',
                    top: 10
                },
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        if (params.dataType === 'edge') {
                            const flight = params.data;
                            return `
                                <div style="padding: 10px;">
                                    <strong>${flight.flightNumber}</strong><br/>
                                    航空公司: ${flight.airline}<br/>
                                    航线: ${flight.fromName} → ${flight.toName}<br/>
                                    状态: <span style="color: ${flight.lineStyle.color}">${flight.status}</span>
                                </div>
                            `;
                        } else if (params.dataType === 'node') {
                            return params.data.name;
                        }
                        return '';
                    }
                },
                geo: {
                    map: 'china',
                    roam: true,
                    zoom: 1.2,
                    label: {
                        show: true,
                        fontSize: 10
                    },
                    itemStyle: {
                        areaColor: '#f3f4f6',
                        borderColor: '#d1d5db'
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#e5e7eb'
                        }
                    }
                },
                series: [
                    {
                        type: 'lines',
                        coordinateSystem: 'geo',
                        data: flightData,
                        lineStyle: {
                            width: 2,
                            opacity: 0.6,
                            curveness: 0.2
                        },
                        effect: {
                            show: true,
                            period: 6,
                            trailLength: 0.7,
                            color: 'inherit'
                        }
                    },
                    {
                        type: 'effectScatter',
                        coordinateSystem: 'geo',
                        data: cityData,
                        symbolSize: 8,
                        showEffectOn: 'render',
                        rippleEffect: {
                            brushType: 'stroke'
                        },
                        // hide airport/city name labels on the map
                        label: {
                            show: false,
                            formatter: '{b}',
                            position: 'right',
                            fontSize: 10
                        },
                        itemStyle: {
                            color: '#2b6cb0',
                            shadowBlur: 10,
                            shadowColor: '#2b6cb0'
                        }
                    }
                ]
            };
            
            mapChartInstance.setOption(option);
        }
        
        // 关闭航班地图模态框
        function closeFlightMapModal() {
            const mapModal = document.getElementById('flight-map-modal');
            if (mapModal) {
                mapModal.classList.remove('active');
                if (mapModal.chartInstance) {
                    mapModal.chartInstance.dispose();
                    mapModal.chartInstance = null;
                }
            }
        }

        // --- 航司自动完成功能 ---
        // 页面加载时获取机场数据
        window.addEventListener('load', function() {
            // 直接使用 static/airports.js 中的数据 AIRPORT_DATA
            // 初始化两个输入框
            setupAirportAutocomplete('modal-departure-airport', 'modal-departure-city');
            setupAirportAutocomplete('modal-arrival-airport', 'modal-arrival-city');
            
            // 初始化航司自动完成
            setupAirlineAutocomplete();
        });

        function setupAirlineAutocomplete() {
            const input = document.getElementById('modal-airline');
            const previewSpan = document.getElementById('full-flight-number-preview');
            const flightNumInput = document.getElementById('modal-flight-number');
            if (!input) return;

            // 恢复IATA代码
            const savedIata = input.dataset.iata;
            const flightNum = flightNumInput.value.trim();
            if (savedIata && flightNum) {
                previewSpan.textContent = savedIata + flightNum;
            } else {
                previewSpan.textContent = (savedIata || '??') + (flightNum || '??');
            }

            // 获取或创建列表容器
            let listId = 'modal-airline-list';
            let listDiv = document.getElementById(listId);
            if (!listDiv) {
                listDiv = document.createElement("div");
                listDiv.setAttribute("id", listId);
                listDiv.setAttribute("class", "autocomplete-items");
                input.parentNode.appendChild(listDiv);
            }

            input.addEventListener("input", function(e) {
                const val = this.value;
                listDiv.innerHTML = "";
                if (!val) return;
                
                // 使用 AIRLINE_DATA 全局变量
                const data = window.AIRLINE_DATA || [];
                let count = 0;
                
                data.forEach(airline => {
                    if (count >= 10) return;
                    
                    const match = (airline.name_cn && airline.name_cn.includes(val)) || 
                                  (airline.name_en && airline.name_en.toLowerCase().includes(val.toLowerCase())) ||
                                  (airline.iata && airline.iata.toUpperCase().includes(val.toUpperCase())) ||
                                  (airline.icao && airline.icao.toUpperCase().includes(val.toUpperCase()));
                    
                    if (match) {
                        const item = document.createElement("div");
                        item.innerHTML = `<strong>${airline.name_cn}</strong> - ${airline.iata}`;
                        item.addEventListener("click", function() {
                            input.value = airline.name_cn;
                            input.dataset.iata = airline.iata;
                            input.dataset.icao = airline.icao;
                            
                            // 更新预览
                            const fNum = flightNumInput.value.trim();
                            previewSpan.textContent = airline.iata + (fNum || '??');
                            
                            listDiv.innerHTML = "";
                        });
                        listDiv.appendChild(item);
                        count++;
                    }
                });
            });

            // 点击外部关闭列表
            document.addEventListener("click", function(e) {
                if (e.target !== input) {
                    listDiv.innerHTML = "";
                }
            });
        }
        
        // --- 机场搜索逻辑优化 ---
        function setupAirportAutocomplete(inputId, cityInputId) {
            const input = document.getElementById(inputId);
            const cityInput = document.getElementById(cityInputId);
            if (!input) return;

            // 获取或创建列表容器
            let listId = inputId + "-list";
            let listDiv = document.getElementById(listId);
            // 如果之前没在HTML里写，就在这里动态创建
            if (!listDiv) {
                listDiv = document.createElement("div");
                listDiv.setAttribute("id", listId);
                listDiv.setAttribute("class", "autocomplete-items");
                input.parentNode.appendChild(listDiv);
            }

            // 监听输入
            input.addEventListener("input", function(e) {
                const val = this.value;
                // 清空之前的列表
                listDiv.innerHTML = "";
                if (!val) return false;
                
                // 使用本地 AIRPORT_DATA，如果未加载则回退到空数组
                const data = window.AIRPORT_DATA || [];
                
                let count = 0;
                // 遍历机场数据
                for (let i = 0; i < data.length; i++) {
                    const airport = data[i];
                    // 匹配逻辑：名称、城市、三字码
                    if ((airport.name && airport.name.includes(val)) || 
                        (airport.city && airport.city.includes(val)) || 
                        (airport.code && airport.code.includes(val.toUpperCase()))) {
                        
                        if (count >= 10) break; // 最多显示10条

                        const item = document.createElement("div");
                        // 标粗匹配项（简单处理）
                        item.innerHTML = `<strong>${airport.city}</strong> - ${airport.name} (${airport.code})`;
                        
                        // 点击事件
                        item.addEventListener("click", function() {
                            input.value = airport.name;
                            if (cityInput) {
                                cityInput.value = airport.city;
                            }
                            listDiv.innerHTML = "";
                        });
                        listDiv.appendChild(item);
                        count++;
                    }
                }
            });
            
            // 点击外部关闭
            document.addEventListener("click", function (e) {
                if (e.target !== input) {
                    listDiv.innerHTML = "";
                }
            });
        }
    </script>
