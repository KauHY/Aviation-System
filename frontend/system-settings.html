<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 飞机检修远程操作系统</title>
    <link rel="stylesheet" href="/static/unified-header.css">
    <style>
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #f7fafc;
        }
        
        .settings-header {
            margin-bottom: 30px;
        }
        
        .settings-header h1 {
            color: #2b6cb0;
            margin: 0;
            font-size: 28px;
        }
        
        .settings-header p {
            color: #718096;
            margin: 10px 0 0 0;
        }
        
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .settings-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .settings-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }
        
        .settings-card h2 {
            color: #2d3748;
            margin: 0 0 20px 0;
            font-size: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #4a5568;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2b6cb0;
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .form-group small {
            display: block;
            color: #a0aec0;
            margin-top: 5px;
            font-size: 12px;
        }
        
        .toggle-switch {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .toggle-switch input {
            display: none;
        }
        
        .toggle-switch label {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
            background: #cbd5e0;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle-switch label::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        
        .toggle-switch input:checked + label {
            background: #2b6cb0;
        }
        
        .toggle-switch input:checked + label::after {
            transform: translateX(24px);
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #2b6cb0;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2c5282;
        }
        
        .btn-secondary {
            background: #718096;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #4a5568;
        }
        
        .btn-success {
            background: #38a169;
            color: white;
        }
        
        .btn-success:hover {
            background: #2f855a;
        }
        
        .btn-danger {
            background: #e53e3e;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c53030;
        }
        
        .settings-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #38a169;
        }
        
        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #e53e3e;
        }
        
        .alert-info {
            background: #bee3f8;
            color: #2c5282;
            border-left: 4px solid #3182ce;
        }
    </style>
</head>
<body>
    <nav class="unified-navbar">
        <div class="unified-navbar-left">
            <a href="/" class="unified-home-btn">返回主页</a>
            <div class="unified-navbar-menu">
                <a href="/video-system" class="unified-navbar-menu">远程视频</a>
                <a href="/image-inspection" class="unified-navbar-menu">智能检修</a>
                <a href="/flight-search" class="unified-navbar-menu">航班查询</a>
                <a href="/inspection-management" class="unified-navbar-menu">区块链管理</a>
                <a href="/aircraft-info" class="unified-navbar-menu">航空器信息</a>
            </div>
        </div>
        
        <div class="unified-navbar-right">
            <div class="unified-user-info" id="userInfo">
                <div class="unified-user-avatar" id="user-avatar">U</div>
                <div class="unified-user-details">
                    <div class="unified-user-name" id="user-name">未登录</div>
                    <div class="unified-user-role" id="user-role">访客</div>
                </div>
            </div>
            <div class="user-dropdown" id="userDropdown">
                <a href="/profile">查看个人信息</a>
                <a href="/system-settings">系统设置</a>
                <a href="/system-monitor">系统监控</a>
                <a href="/report-generation">报表生成</a>
                <a href="/permission-management">权限管理</a>
                <a href="/login" class="logout">退出登录</a>
            </div>
        </div>
    </nav>
    <script src="/static/unified-header.js"></script>
    
    <div class="container">
        <div class="settings-header">
            <h1>系统设置</h1>
            <p>配置系统参数和功能选项</p>
        </div>
        
        <div id="alert-container"></div>
        
        <div class="settings-grid">
            <div class="settings-card">
                <h2>🔐 安全设置</h2>
                <div class="form-group">
                    <label for="session-timeout">会话超时时间（分钟）</label>
                    <input type="number" id="session-timeout" value="30" min="5" max="480">
                    <small>用户登录后无操作自动退出的时间</small>
                </div>
                <div class="form-group">
                    <label for="password-policy">密码策略</label>
                    <select id="password-policy">
                        <option value="simple">简单（至少6位）</option>
                        <option value="medium" selected>中等（至少8位，包含字母和数字）</option>
                        <option value="strong">强（至少10位，包含大小写字母、数字和特殊字符）</option>
                    </select>
                </div>
                <div class="form-group toggle-switch">
                    <label>启用双因素认证</label>
                    <input type="checkbox" id="enable-2fa">
                    <label for="enable-2fa"></label>
                </div>
            </div>
            
            <div class="settings-card">
                <h2>📊 数据设置</h2>
                <div class="form-group">
                    <label for="data-retention">数据保留期限（天）</label>
                    <input type="number" id="data-retention" value="365" min="30" max="3650">
                    <small>超过此期限的日志和临时数据将被自动清理</small>
                </div>
                <div class="form-group">
                    <label for="backup-frequency">自动备份频率</label>
                    <select id="backup-frequency">
                        <option value="daily">每天</option>
                        <option value="weekly" selected>每周</option>
                        <option value="monthly">每月</option>
                        <option value="manual">手动</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="backup-location">备份存储位置</label>
                    <input type="text" id="backup-location" value="./backups" placeholder="备份文件存储路径">
                </div>
            </div>
            
            <div class="settings-card">
                <h2>🔔 通知设置</h2>
                <div class="form-group toggle-switch">
                    <label>启用邮件通知</label>
                    <input type="checkbox" id="enable-email-notif" checked>
                    <label for="enable-email-notif"></label>
                </div>
                <div class="form-group">
                    <label for="email-smtp">SMTP服务器</label>
                    <input type="text" id="email-smtp" placeholder="smtp.example.com">
                </div>
                <div class="form-group">
                    <label for="email-port">SMTP端口</label>
                    <input type="number" id="email-port" value="587" min="1" max="65535">
                </div>
                <div class="form-group toggle-switch">
                    <label>启用系统告警</label>
                    <input type="checkbox" id="enable-alerts" checked>
                    <label for="enable-alerts"></label>
                </div>
            </div>
            
            <div class="settings-card">
                <h2>⚙️ 系统配置</h2>
                <div class="form-group">
                    <label for="system-name">系统名称</label>
                    <input type="text" id="system-name" value="飞机检修远程操作系统">
                </div>
                <div class="form-group">
                    <label for="system-timezone">系统时区</label>
                    <select id="system-timezone">
                        <option value="Asia/Shanghai" selected>中国标准时间 (UTC+8)</option>
                        <option value="Asia/Hong_Kong">香港时间 (UTC+8)</option>
                        <option value="Asia/Tokyo">日本标准时间 (UTC+9)</option>
                        <option value="UTC">协调世界时 (UTC+0)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="log-level">日志级别</label>
                    <select id="log-level">
                        <option value="debug">调试</option>
                        <option value="info" selected>信息</option>
                        <option value="warning">警告</option>
                        <option value="error">错误</option>
                    </select>
                </div>
                <div class="form-group toggle-switch">
                    <label>启用维护模式</label>
                    <input type="checkbox" id="enable-maintenance">
                    <label for="enable-maintenance"></label>
                </div>
            </div>
            
            <div class="settings-card">
                <h2>🎨 界面设置</h2>
                <div class="form-group">
                    <label for="theme">主题</label>
                    <select id="theme">
                        <option value="light" selected>浅色</option>
                        <option value="dark">深色</option>
                        <option value="auto">自动</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="language">语言</label>
                    <select id="language">
                        <option value="zh-CN" selected>简体中文</option>
                        <option value="zh-TW">繁體中文</option>
                        <option value="en-US">English</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="page-size">每页显示数量</label>
                    <input type="number" id="page-size" value="20" min="5" max="100">
                </div>
            </div>
            
            <div class="settings-card">
                <h2>💾 数据管理</h2>
                <div class="form-group">
                    <label>数据备份</label>
                    <div class="settings-actions">
                        <button class="btn btn-primary" onclick="backupData()">立即备份</button>
                        <button class="btn btn-secondary" onclick="downloadBackup()">下载备份</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>数据恢复</label>
                    <input type="file" id="restore-file" accept=".json,.zip">
                    <div class="settings-actions">
                        <button class="btn btn-danger" onclick="restoreData()">恢复数据</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>数据清理</label>
                    <div class="settings-actions">
                        <button class="btn btn-secondary" onclick="clearCache()">清理缓存</button>
                        <button class="btn btn-danger" onclick="clearLogs()">清理日志</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="settings-actions" style="justify-content: flex-end;">
            <button class="btn btn-secondary" onclick="resetSettings()">重置默认</button>
            <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
        </div>
    </div>
    
    <script>
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }
        
        function saveSettings() {
            const settings = {
                sessionTimeout: document.getElementById('session-timeout').value,
                passwordPolicy: document.getElementById('password-policy').value,
                enable2FA: document.getElementById('enable-2fa').checked,
                dataRetention: document.getElementById('data-retention').value,
                backupFrequency: document.getElementById('backup-frequency').value,
                backupLocation: document.getElementById('backup-location').value,
                enableEmailNotif: document.getElementById('enable-email-notif').checked,
                emailSMTP: document.getElementById('email-smtp').value,
                emailPort: document.getElementById('email-port').value,
                enableAlerts: document.getElementById('enable-alerts').checked,
                systemName: document.getElementById('system-name').value,
                systemTimezone: document.getElementById('system-timezone').value,
                logLevel: document.getElementById('log-level').value,
                enableMaintenance: document.getElementById('enable-maintenance').checked,
                theme: document.getElementById('theme').value,
                language: document.getElementById('language').value,
                pageSize: document.getElementById('page-size').value
            };
            
            localStorage.setItem('systemSettings', JSON.stringify(settings));
            showAlert('设置保存成功！', 'success');
        }
        
        function loadSettings() {
            const savedSettings = localStorage.getItem('systemSettings');
            if (savedSettings) {
                const settings = JSON.parse(savedSettings);
                
                if (settings.sessionTimeout) document.getElementById('session-timeout').value = settings.sessionTimeout;
                if (settings.passwordPolicy) document.getElementById('password-policy').value = settings.passwordPolicy;
                if (settings.enable2FA !== undefined) document.getElementById('enable-2fa').checked = settings.enable2FA;
                if (settings.dataRetention) document.getElementById('data-retention').value = settings.dataRetention;
                if (settings.backupFrequency) document.getElementById('backup-frequency').value = settings.backupFrequency;
                if (settings.backupLocation) document.getElementById('backup-location').value = settings.backupLocation;
                if (settings.enableEmailNotif !== undefined) document.getElementById('enable-email-notif').checked = settings.enableEmailNotif;
                if (settings.emailSMTP) document.getElementById('email-smtp').value = settings.emailSMTP;
                if (settings.emailPort) document.getElementById('email-port').value = settings.emailPort;
                if (settings.enableAlerts !== undefined) document.getElementById('enable-alerts').checked = settings.enableAlerts;
                if (settings.systemName) document.getElementById('system-name').value = settings.systemName;
                if (settings.systemTimezone) document.getElementById('system-timezone').value = settings.systemTimezone;
                if (settings.logLevel) document.getElementById('log-level').value = settings.logLevel;
                if (settings.enableMaintenance !== undefined) document.getElementById('enable-maintenance').checked = settings.enableMaintenance;
                if (settings.theme) document.getElementById('theme').value = settings.theme;
                if (settings.language) document.getElementById('language').value = settings.language;
                if (settings.pageSize) document.getElementById('page-size').value = settings.pageSize;
            }
        }
        
        function resetSettings() {
            if (confirm('确定要重置所有设置为默认值吗？')) {
                localStorage.removeItem('systemSettings');
                location.reload();
            }
        }
        
        async function backupData() {
            try {
                showAlert('正在备份数据...', 'info');
                const response = await fetch('/api/system/backup', {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.success) {
                    showAlert('数据备份成功！', 'success');
                } else {
                    showAlert('备份失败：' + result.error, 'error');
                }
            } catch (error) {
                showAlert('备份失败：' + error.message, 'error');
            }
        }
        
        async function downloadBackup() {
            try {
                const response = await fetch('/api/system/backup/download');
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `backup_${new Date().toISOString().split('T')[0]}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    showAlert('备份下载成功！', 'success');
                } else {
                    showAlert('下载备份失败', 'error');
                }
            } catch (error) {
                showAlert('下载失败：' + error.message, 'error');
            }
        }
        
        async function restoreData() {
            const fileInput = document.getElementById('restore-file');
            if (!fileInput.files || fileInput.files.length === 0) {
                showAlert('请选择要恢复的备份文件', 'error');
                return;
            }
            
            if (!confirm('确定要恢复数据吗？这将覆盖当前所有数据！')) {
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('backup', fileInput.files[0]);
                
                showAlert('正在恢复数据...', 'info');
                const response = await fetch('/api/system/restore', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    showAlert('数据恢复成功！', 'success');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    showAlert('恢复失败：' + result.error, 'error');
                }
            } catch (error) {
                showAlert('恢复失败：' + error.message, 'error');
            }
        }
        
        async function clearCache() {
            if (confirm('确定要清理缓存吗？')) {
                try {
                    const response = await fetch('/api/system/clear-cache', {
                        method: 'POST'
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        showAlert('缓存清理成功！', 'success');
                    } else {
                        showAlert('清理失败：' + result.error, 'error');
                    }
                } catch (error) {
                    showAlert('清理失败：' + error.message, 'error');
                }
            }
        }
        
        async function clearLogs() {
            if (confirm('确定要清理日志吗？此操作不可恢复！')) {
                try {
                    const response = await fetch('/api/system/clear-logs', {
                        method: 'POST'
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        showAlert('日志清理成功！', 'success');
                    } else {
                        showAlert('清理失败：' + result.error, 'error');
                    }
                } catch (error) {
                    showAlert('清理失败：' + error.message, 'error');
                }
            }
        }
        
        window.addEventListener('load', loadSettings);
    </script>
</body>
</html>
